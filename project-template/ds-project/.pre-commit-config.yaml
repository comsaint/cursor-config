minimum_pre_commit_version: "3.0.0"
fail_fast: false

repos:
  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: detect-private-key
        stages: [pre-commit]

  # Ruff: lint + auto-fix
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        stages: [pre-commit]
      - id: ruff-format
        stages: [pre-commit]

  # Mypy: static type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file, pyproject.toml]
        stages: [pre-commit]
        pass_filenames: false

  # Tests + coverage: only before push
  - repo: local
    hooks:
      - id: pytest-cov
        name: pytest with coverage
        # Coverage options come from pyproject.toml (incl. --cov, fail_under).
        entry: pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]